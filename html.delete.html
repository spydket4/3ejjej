<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Обогащённый уран</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0fff0;
        }
        header {
            text-align: center;
            color: #2e7d32;
        }
        .product {
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
            border: 2px solid #2e7d32;
            border-radius: 10px;
            background-color: #ffffff;
        }
        .product img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 15px;
            border-radius: 8px;
        }
        h1 {
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1em;
            line-height: 1.5;
        }
        .button {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 10px;
            background-color: #2e7d32;
            color: #fff;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2em;
        }
        .button:hover {
            background-color: #4caf50;
        }
    </style>
</head>
<body>
    <header>
        <h1>Обогащённый уран</h1>
        <p>Лучшее решение для вашего сада и огорода!</p>
    </header>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1616797363123-2b3c6dc4b0a9" alt="Обогащённая зелёная почва">
        <h2>Описание продукта</h2>
        <p>Наш обогащённый уран содержит натуральные ингредиенты, обеспечивающие быстрый рост растений и укрепляют их здоровье. Идеально подходит для овощных, фруктовых и декоративных культур.</p>
        <a class="button" href="#">Заказать сейчас</a>
    </div>
</body>
</html>
